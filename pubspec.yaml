name: timemark
description: "Timemark Editor"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0
  geolocator: ^13.0.0
  intl: ^0.19.0
  screenshot: ^3.0.0
  gal: ^2.3.0
  path_provider: ^2.1.0
  image_picker: ^1.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true


flutter_native_splash:
  color: "#3F51B5"
  color_dark: "#3F51B5"
  android_12:
    color: "#3F51B5"
    color_dark: "#3F51B5"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21